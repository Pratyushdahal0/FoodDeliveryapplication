<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodExpress — Restaurants</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/images/brand/foodexpress-favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="../assets/images/brand/foodexpress-favicon-64.png"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/shop.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        alert("Please login first");
        window.location.href = "login.html";
      }
    </script>

    <div id="navbarContainer"></div>

    <main class="restaurant-page">
      <section class="restaurant-hero">
        <div>
          <span class="breadcrumb">Home › Restaurants</span>
          <h1>Restaurants List</h1>
          <p id="restaurantCount">Loading approved restaurants...</p>
        </div>

        <div class="restaurant-search">
          <input
            type="text"
            id="restaurantSearchInput"
            placeholder="Search restaurants..."
          />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </section>

      <section class="restaurant-layout">
        <aside class="restaurant-filter">
          <div class="filter-title-row">
            <h3>Filter</h3>
            <button type="button" id="clearFilterBtn">Clear Filter</button>
          </div>

          <div class="filter-group">
            <h4>Sort By</h4>

            <label>
              <input type="radio" name="sort" value="asc" checked />
              A-Z Ascending
            </label>

            <label>
              <input type="radio" name="sort" value="desc" />
              Z-A Descending
            </label>
          </div>

          <div class="filter-group">
            <h4>Open Status</h4>

            <label>
              <input type="radio" name="openStatus" value="all" checked />
              All
            </label>

            <label>
              <input type="radio" name="openStatus" value="open" />
              Open Now
            </label>
          </div>

          <div class="filter-group">
            <h4>Cuisine</h4>
            <div id="cuisineFilters">
              <p class="filter-muted">Loading cuisines...</p>
            </div>
          </div>
        </aside>

        <section class="restaurant-results" id="restaurantList">
          <div class="restaurant-loading">Loading approved restaurants...</div>
        </section>
      </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <!-- Page API -->
    <script src="../js/api/restaurantApi.js"></script>

    <!-- Shared customer app files -->
    <script src="../js/profile.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/modules/cart.js"></script>

    <!-- Shared navbar/footer components -->
    <script src="../js/components/notifications.js?v=backendnotif3"></script>
    <script src="../js/components/navbar.js"></script>
    <script src="../js/components/footer.js"></script>

    <script>
      let approvedRestaurants = [];
      let selectedCuisine = "all";

      document.addEventListener("DOMContentLoaded", function () {
        if (typeof window.renderNavbar === "function") {
          window.renderNavbar("shop");
        }

        if (typeof window.renderFooter === "function") {
          window.renderFooter("app");
        }

        if (typeof window.bindProfileEverywhere === "function") {
          window.bindProfileEverywhere();
        }

        if (typeof window.bindNotificationBell === "function") {
          window.bindNotificationBell();
        }

        setupRestaurantPage();
      });

      async function setupRestaurantPage() {
        try {
          approvedRestaurants = await getApprovedRestaurants();

          if (!Array.isArray(approvedRestaurants)) {
            approvedRestaurants = [];
          }

          buildCuisineFilters();
          attachFilterEvents();
          renderRestaurants();
        } catch (error) {
          console.error("[shop.html] Failed to load restaurants:", error);

          const count = document.getElementById("restaurantCount");
          const container = document.getElementById("restaurantList");

          if (count) {
            count.textContent = "0 restaurants found";
          }

          if (container) {
            container.innerHTML = `
              <div class="restaurant-empty">
                <h3>Unable to load restaurants</h3>
                <p>Please check your backend connection and try again.</p>
              </div>
            `;
          }
        }
      }

      function attachFilterEvents() {
        const searchInput = document.getElementById("restaurantSearchInput");
        const clearBtn = document.getElementById("clearFilterBtn");

        if (searchInput) {
          searchInput.addEventListener("input", renderRestaurants);
        }

        document.querySelectorAll("input[name='sort']").forEach((input) => {
          input.addEventListener("change", renderRestaurants);
        });

        document
          .querySelectorAll("input[name='openStatus']")
          .forEach((input) => {
            input.addEventListener("change", renderRestaurants);
          });

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            if (searchInput) {
              searchInput.value = "";
            }

            selectedCuisine = "all";

            const ascSort = document.querySelector(
              "input[name='sort'][value='asc']",
            );

            const allStatus = document.querySelector(
              "input[name='openStatus'][value='all']",
            );

            if (ascSort) ascSort.checked = true;
            if (allStatus) allStatus.checked = true;

            buildCuisineFilters();
            renderRestaurants();
          });
        }
      }

      function buildCuisineFilters() {
        const cuisineContainer = document.getElementById("cuisineFilters");
        if (!cuisineContainer) return;

        const cuisines = [
          ...new Set(
            approvedRestaurants
              .map((restaurant) => restaurant.cuisine_type)
              .filter(Boolean),
          ),
        ];

        if (!cuisines.length) {
          cuisineContainer.innerHTML = `<p class="filter-muted">No cuisines yet</p>`;
          return;
        }

        cuisineContainer.innerHTML = `
          <button
            type="button"
            class="cuisine-chip ${selectedCuisine === "all" ? "active" : ""}"
            onclick="setCuisineFilter('all')"
          >
            All
          </button>

          ${cuisines
            .map(
              (cuisine) => `
                <button
                  type="button"
                  class="cuisine-chip ${
                    selectedCuisine === cuisine ? "active" : ""
                  }"
                  onclick="setCuisineFilter('${escapeAttribute(cuisine)}')"
                >
                  ${escapeHtml(cuisine)}
                </button>
              `,
            )
            .join("")}
        `;
      }

      function setCuisineFilter(cuisine) {
        selectedCuisine = cuisine;
        buildCuisineFilters();
        renderRestaurants();
      }

      function renderRestaurants() {
        const container = document.getElementById("restaurantList");
        const count = document.getElementById("restaurantCount");

        if (!container || !count) return;

        const query =
          document
            .getElementById("restaurantSearchInput")
            ?.value.trim()
            .toLowerCase() || "";

        const sort =
          document.querySelector("input[name='sort']:checked")?.value || "asc";

        const openStatus =
          document.querySelector("input[name='openStatus']:checked")?.value ||
          "all";

        let restaurants = approvedRestaurants.filter((restaurant) => {
          const searchText = [
            restaurant.restaurant_name,
            restaurant.cuisine_type,
            restaurant.city,
            restaurant.location,
          ]
            .map((value) => String(value || "").toLowerCase())
            .join(" ");

          const matchesSearch = query ? searchText.includes(query) : true;

          const matchesCuisine =
            selectedCuisine === "all"
              ? true
              : restaurant.cuisine_type === selectedCuisine;

          const operation = getRestaurantOperationalStatus(restaurant);

          const matchesOpen =
            openStatus === "all"
              ? true
              : operation.key === "open" || operation.key === "busy";

          return matchesSearch && matchesCuisine && matchesOpen;
        });

        restaurants.sort((a, b) => {
          const nameA = String(a.restaurant_name || "").toLowerCase();
          const nameB = String(b.restaurant_name || "").toLowerCase();

          return sort === "asc"
            ? nameA.localeCompare(nameB)
            : nameB.localeCompare(nameA);
        });

        count.textContent = `${restaurants.length} restaurant${
          restaurants.length === 1 ? "" : "s"
        } found`;

        if (!restaurants.length) {
          container.innerHTML = `
            <div class="restaurant-empty">
              <h3>No restaurants found</h3>
              <p>Try changing your search or filters.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = restaurants
          .map((restaurant) => createRestaurantCard(restaurant))
          .join("");
      }

      function createRestaurantCard(restaurant) {
        const operation = getRestaurantOperationalStatus(restaurant);
        const eta = calculateSmartEta(restaurant);

        const image =
          restaurant.logo_url && restaurant.logo_url !== "null"
            ? restaurant.logo_url
            : restaurant.cover_image_url &&
                restaurant.cover_image_url !== "null"
              ? restaurant.cover_image_url
              : "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&q=80";

        const actionLabel =
          operation.canAddToCart || operation.canCheckout
            ? "View Menu"
            : "View Menu";

        return `
    <article class="restaurant-row-card ${operation.key}">
      <div class="restaurant-logo-wrap">
        <img
          src="${escapeHtml(image)}"
          alt="${escapeHtml(restaurant.restaurant_name || "Restaurant")}"
          onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&q=80';"
        />
      </div>

      <div class="restaurant-main-info">
        <div class="restaurant-title-line">
          <h3>${escapeHtml(restaurant.restaurant_name || "Unnamed Restaurant")}</h3>

          <span class="open-badge ${operation.badgeClass}">
            ${escapeHtml(operation.label)}
          </span>
        </div>

        <p class="restaurant-meta">
          <i class="fa-solid fa-location-dot"></i>
          ${escapeHtml(restaurant.location || restaurant.city || "Location not added")}
        </p>

        <p class="restaurant-meta">
          <i class="fa-solid fa-utensils"></i>
          ${escapeHtml(restaurant.cuisine_type || "Restaurant")}
        </p>

        <p class="restaurant-meta ${operation.key === "busy" ? "restaurant-busy-text" : ""}">
          <i class="fa-solid fa-clock"></i>
          ${escapeHtml(operation.message)}
        </p>

        <p class="restaurant-rating">
          <i class="fa-solid fa-star"></i>
          <span>${escapeHtml(restaurant.rating || "4.8")}</span>
          <span class="eta-pill">
            <i class="fa-solid fa-motorcycle"></i>
            ${escapeHtml(eta.label)}
          </span>
        </p>

        <p class="restaurant-desc">
          ${escapeHtml(
            restaurant.description ||
              "Fresh food available from this restaurant.",
          )}
        </p>

        <div class="restaurant-offer ${operation.canCheckout ? "" : "warning"}">
          ${operation.offerHtml}
        </div>
      </div>

      <div class="restaurant-action">
        <button
          type="button"
          class="${operation.canViewMenu ? "" : "disabled"}"
          onclick="viewRestaurantMenu(
            ${Number(restaurant.id || 0)},
            '${escapeAttribute(restaurant.restaurant_name || "Restaurant")}'
          )"
        >
          ${escapeHtml(actionLabel)}
        </button>

        ${
          operation.canCheckout
            ? `<small class="restaurant-action-note">Ordering available</small>`
            : `<small class="restaurant-action-note blocked">${escapeHtml(operation.blockReason)}</small>`
        }
      </div>
    </article>
  `;
      }

      function viewRestaurantMenu(id, restaurantName = "Restaurant") {
        if (!id) {
          alert("Restaurant ID not found.");
          return;
        }

        const restaurant = approvedRestaurants.find(
          (item) => Number(item.id) === Number(id),
        );

        const operation = restaurant
          ? getRestaurantOperationalStatus(restaurant)
          : {
              key: "open",
              canAddToCart: true,
              canCheckout: true,
              message: "Open",
            };

        const selectedRestaurant = {
          ...(restaurant || {}),
          id: Number(id),
          restaurant_id: Number(id),
          name: restaurantName,
          restaurant_name: restaurantName,
          operation_status: operation.key,
          can_add_to_cart: operation.canAddToCart,
          can_checkout: operation.canCheckout,
          operation_message: operation.message,
          selectedAt: new Date().toISOString(),
        };

        localStorage.setItem("selectedRestaurantId", String(id));
        localStorage.setItem("selectedRestaurantName", restaurantName);
        localStorage.setItem(
          "foodExpressSelectedRestaurant",
          JSON.stringify(selectedRestaurant),
        );

        window.location.href = `food.html?restaurant_id=${encodeURIComponent(
          id,
        )}&restaurant=${encodeURIComponent(restaurantName)}`;
      }

      function getRestaurantOperationalStatus(restaurant) {
        const isOpenFlag = Number(restaurant.is_open ?? 1) === 1;
        const acceptingOrders = Number(restaurant.accepting_orders ?? 1) === 1;
        const deliveryAvailable =
          Number(restaurant.delivery_available ?? 1) === 1;
        const busyMode = Number(restaurant.busy_mode ?? 0) === 1;
        const showBusyBanner = Number(restaurant.show_busy_banner ?? 1) === 1;

        const timeOpen = isWithinOpeningHours(restaurant);
        const openingTime = restaurant.opening_time || "09:00:00";
        const closingTime = restaurant.closing_time || "22:00:00";

        if (!isOpenFlag || !timeOpen) {
          return {
            key: "closed",
            label: "Closed",
            badgeClass: "closed",
            message: `Closed · Opens at ${formatRestaurantTime(openingTime)}`,
            canViewMenu: true,
            canAddToCart: false,
            canCheckout: false,
            blockReason: "Ordering closed",
            offerHtml: `<i class="fa-solid fa-door-closed"></i> Ordering is currently closed`,
          };
        }

        if (!acceptingOrders) {
          return {
            key: "paused",
            label: "Paused",
            badgeClass: "closed",
            message: "Open · Not accepting orders",
            canViewMenu: true,
            canAddToCart: false,
            canCheckout: false,
            blockReason: "Not accepting orders",
            offerHtml: `<i class="fa-solid fa-circle-pause"></i> Not accepting new orders right now`,
          };
        }

        if (!deliveryAvailable) {
          return {
            key: "delivery_off",
            label: "Delivery Off",
            badgeClass: "closed",
            message: "Delivery unavailable right now",
            canViewMenu: true,
            canAddToCart: false,
            canCheckout: false,
            blockReason: "Delivery unavailable",
            offerHtml: `<i class="fa-solid fa-truck-ramp-box"></i> Delivery unavailable right now`,
          };
        }

        if (busyMode) {
          return {
            key: "busy",
            label: "Busy",
            badgeClass: "busy",
            message: showBusyBanner
              ? "Busy · Longer wait time"
              : `Open · Until ${formatRestaurantTime(closingTime)}`,
            canViewMenu: true,
            canAddToCart: true,
            canCheckout: true,
            blockReason: "",
            offerHtml: `<i class="fa-solid fa-fire-burner"></i> Kitchen busy · ETA may be longer`,
          };
        }

        return {
          key: "open",
          label: "Open",
          badgeClass: "open",
          message: `Open · Until ${formatRestaurantTime(closingTime)}`,
          canViewMenu: true,
          canAddToCart: true,
          canCheckout: true,
          blockReason: "",
          offerHtml: `<i class="fa-solid fa-truck"></i> Delivery available`,
        };
      }

      function isWithinOpeningHours(restaurant) {
        if (!restaurant.opening_time || !restaurant.closing_time) {
          return true;
        }

        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        const openMinutes = timeToMinutes(restaurant.opening_time);
        const closeMinutes = timeToMinutes(restaurant.closing_time);

        if (openMinutes === null || closeMinutes === null) {
          return true;
        }

        if (openMinutes === closeMinutes) {
          return true;
        }

        // normal same-day schedule, e.g. 09:00–22:00
        if (openMinutes < closeMinutes) {
          return (
            currentMinutes >= openMinutes && currentMinutes <= closeMinutes
          );
        }

        // overnight schedule, e.g. 18:00–02:00
        return currentMinutes >= openMinutes || currentMinutes <= closeMinutes;
      }

      function timeToMinutes(time) {
        const [hourRaw, minuteRaw] = String(time).split(":");
        const hour = Number(hourRaw);
        const minute = Number(minuteRaw || 0);

        if (Number.isNaN(hour) || Number.isNaN(minute)) {
          return null;
        }

        return hour * 60 + minute;
      }

      function formatRestaurantTime(time) {
        const minutes = timeToMinutes(time);
        if (minutes === null) return "soon";

        const hour24 = Math.floor(minutes / 60);
        const minute = minutes % 60;
        const suffix = hour24 >= 12 ? "PM" : "AM";
        const hour12 = hour24 % 12 || 12;

        return `${hour12}:${String(minute).padStart(2, "0")} ${suffix}`;
      }

      function calculateSmartEta(restaurant) {
        const operation = getRestaurantOperationalStatus(restaurant);

        if (!operation.canCheckout) {
          return {
            min: 0,
            max: 0,
            label: "Unavailable",
          };
        }

        const basePrep = Number(restaurant.estimated_prep_minutes || 25);
        const handoff = Number(restaurant.avg_handoff_minutes || 5);
        const radius = Number(restaurant.delivery_radius_km || 5);
        const busyExtra = Number(restaurant.busy_mode || 0) === 1 ? 8 : 0;

        const travelEstimate = Math.ceil(radius * 1.5);
        const min = Math.max(
          15,
          basePrep + handoff + busyExtra + travelEstimate,
        );
        const max = min + 12;

        return {
          min,
          max,
          label: `${min}–${max} mins`,
        };
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttribute(value) {
        return String(value ?? "")
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'");
      }
    </script>
  </body>
</html>
