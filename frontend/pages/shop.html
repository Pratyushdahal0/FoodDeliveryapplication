<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodExpress — Restaurants</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/images/brand/foodexpress-favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="../assets/images/brand/foodexpress-favicon-64.png"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/shop.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        alert("Please login first");
        window.location.href = "login.html";
      }
    </script>

    <div id="navbarContainer"></div>

    <main class="restaurant-page">
      <section class="restaurant-hero">
        <div>
          <span class="breadcrumb">Home › Restaurants</span>
          <h1>Restaurants List</h1>
          <p id="restaurantCount">Loading approved restaurants...</p>
        </div>

        <div class="restaurant-search">
          <input
            type="text"
            id="restaurantSearchInput"
            placeholder="Search restaurants..."
          />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </section>

      <section class="restaurant-layout">
        <aside class="restaurant-filter">
          <div class="filter-title-row">
            <h3>Filter</h3>
            <button type="button" id="clearFilterBtn">Clear Filter</button>
          </div>

          <div class="filter-group">
            <h4>Sort By</h4>

            <label>
              <input type="radio" name="sort" value="asc" checked />
              A-Z Ascending
            </label>

            <label>
              <input type="radio" name="sort" value="desc" />
              Z-A Descending
            </label>
          </div>

          <div class="filter-group">
            <h4>Open Status</h4>

            <label>
              <input type="radio" name="openStatus" value="all" checked />
              All
            </label>

            <label>
              <input type="radio" name="openStatus" value="open" />
              Open Now
            </label>
          </div>

          <div class="filter-group">
            <h4>Cuisine</h4>
            <div id="cuisineFilters">
              <p class="filter-muted">Loading cuisines...</p>
            </div>
          </div>
        </aside>

        <section class="restaurant-results" id="restaurantList">
          <div class="restaurant-loading">Loading approved restaurants...</div>
        </section>
      </section>
    </main>

    <footer class="footer" id="footer"></footer>

    <!-- Page API -->
    <script src="../js/api/restaurantApi.js"></script>

    <!-- Shared customer app files -->
    <script src="../js/profile.js"></script>
    <script src="../js/shared.js"></script>
    <script src="../js/modules/cart.js"></script>

    <!-- Shared navbar/footer components -->
    <script src="../js/components/notifications.js?v=backendnotif3"></script>
    <script src="../js/components/navbar.js"></script>
    <script src="../js/components/footer.js"></script>

    <script>
      let approvedRestaurants = [];
      let selectedCuisine = "all";

      document.addEventListener("DOMContentLoaded", function () {
        if (typeof window.renderNavbar === "function") {
          window.renderNavbar("shop");
        }

        if (typeof window.renderFooter === "function") {
          window.renderFooter("app");
        }

        if (typeof window.bindProfileEverywhere === "function") {
          window.bindProfileEverywhere();
        }

        if (typeof window.bindNotificationBell === "function") {
          window.bindNotificationBell();
        }

        setupRestaurantPage();
      });

      async function setupRestaurantPage() {
        try {
          approvedRestaurants = await getApprovedRestaurants();

          if (!Array.isArray(approvedRestaurants)) {
            approvedRestaurants = [];
          }

          buildCuisineFilters();
          attachFilterEvents();
          renderRestaurants();
        } catch (error) {
          console.error("[shop.html] Failed to load restaurants:", error);

          const count = document.getElementById("restaurantCount");
          const container = document.getElementById("restaurantList");

          if (count) {
            count.textContent = "0 restaurants found";
          }

          if (container) {
            container.innerHTML = `
              <div class="restaurant-empty">
                <h3>Unable to load restaurants</h3>
                <p>Please check your backend connection and try again.</p>
              </div>
            `;
          }
        }
      }

      function attachFilterEvents() {
        const searchInput = document.getElementById("restaurantSearchInput");
        const clearBtn = document.getElementById("clearFilterBtn");

        if (searchInput) {
          searchInput.addEventListener("input", renderRestaurants);
        }

        document.querySelectorAll("input[name='sort']").forEach((input) => {
          input.addEventListener("change", renderRestaurants);
        });

        document
          .querySelectorAll("input[name='openStatus']")
          .forEach((input) => {
            input.addEventListener("change", renderRestaurants);
          });

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            if (searchInput) {
              searchInput.value = "";
            }

            selectedCuisine = "all";

            const ascSort = document.querySelector(
              "input[name='sort'][value='asc']",
            );

            const allStatus = document.querySelector(
              "input[name='openStatus'][value='all']",
            );

            if (ascSort) ascSort.checked = true;
            if (allStatus) allStatus.checked = true;

            buildCuisineFilters();
            renderRestaurants();
          });
        }
      }

      function buildCuisineFilters() {
        const cuisineContainer = document.getElementById("cuisineFilters");
        if (!cuisineContainer) return;

        const cuisines = [
          ...new Set(
            approvedRestaurants
              .map((restaurant) => restaurant.cuisine_type)
              .filter(Boolean),
          ),
        ];

        if (!cuisines.length) {
          cuisineContainer.innerHTML = `<p class="filter-muted">No cuisines yet</p>`;
          return;
        }

        cuisineContainer.innerHTML = `
          <button
            type="button"
            class="cuisine-chip ${selectedCuisine === "all" ? "active" : ""}"
            onclick="setCuisineFilter('all')"
          >
            All
          </button>

          ${cuisines
            .map(
              (cuisine) => `
                <button
                  type="button"
                  class="cuisine-chip ${
                    selectedCuisine === cuisine ? "active" : ""
                  }"
                  onclick="setCuisineFilter('${escapeAttribute(cuisine)}')"
                >
                  ${escapeHtml(cuisine)}
                </button>
              `,
            )
            .join("")}
        `;
      }

      function setCuisineFilter(cuisine) {
        selectedCuisine = cuisine;
        buildCuisineFilters();
        renderRestaurants();
      }

      function renderRestaurants() {
        const container = document.getElementById("restaurantList");
        const count = document.getElementById("restaurantCount");

        if (!container || !count) return;

        const query =
          document
            .getElementById("restaurantSearchInput")
            ?.value.trim()
            .toLowerCase() || "";

        const sort =
          document.querySelector("input[name='sort']:checked")?.value || "asc";

        const openStatus =
          document.querySelector("input[name='openStatus']:checked")?.value ||
          "all";

        let restaurants = approvedRestaurants.filter((restaurant) => {
          const searchText = [
            restaurant.restaurant_name,
            restaurant.cuisine_type,
            restaurant.city,
            restaurant.location,
          ]
            .map((value) => String(value || "").toLowerCase())
            .join(" ");

          const matchesSearch = query ? searchText.includes(query) : true;

          const matchesCuisine =
            selectedCuisine === "all"
              ? true
              : restaurant.cuisine_type === selectedCuisine;

          const matchesOpen =
            openStatus === "all" ? true : isRestaurantOpen(restaurant);

          return matchesSearch && matchesCuisine && matchesOpen;
        });

        restaurants.sort((a, b) => {
          const nameA = String(a.restaurant_name || "").toLowerCase();
          const nameB = String(b.restaurant_name || "").toLowerCase();

          return sort === "asc"
            ? nameA.localeCompare(nameB)
            : nameB.localeCompare(nameA);
        });

        count.textContent = `${restaurants.length} restaurant${
          restaurants.length === 1 ? "" : "s"
        } found`;

        if (!restaurants.length) {
          container.innerHTML = `
            <div class="restaurant-empty">
              <h3>No restaurants found</h3>
              <p>Try changing your search or filters.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = restaurants
          .map((restaurant) => createRestaurantCard(restaurant))
          .join("");
      }

      function createRestaurantCard(restaurant) {
        const open = isRestaurantOpen(restaurant);

        const image =
          restaurant.logo_url && restaurant.logo_url !== "null"
            ? restaurant.logo_url
            : "https://via.placeholder.com/400x300?text=FoodExpress";

        return `
          <article class="restaurant-row-card">
            <div class="restaurant-logo-wrap">
              <img
                src="${escapeHtml(image)}"
                alt="${escapeHtml(restaurant.restaurant_name || "Restaurant")}"
                onerror="this.onerror=null; this.src='https://via.placeholder.com/120x120?text=Restaurant';"
              />
            </div>

            <div class="restaurant-main-info">
              <div class="restaurant-title-line">
                <h3>${escapeHtml(
                  restaurant.restaurant_name || "Unnamed Restaurant",
                )}</h3>

                <span class="open-badge ${open ? "open" : "closed"}">
                  ${open ? "Open" : "Closed"}
                </span>
              </div>

              <p class="restaurant-meta">
                <i class="fa-solid fa-location-dot"></i>
                ${escapeHtml(
                  restaurant.location ||
                    restaurant.city ||
                    "Location not added",
                )}
              </p>

              <p class="restaurant-meta">
                <i class="fa-solid fa-utensils"></i>
                ${escapeHtml(restaurant.cuisine_type || "Restaurant")}
              </p>

              <p class="restaurant-rating">
                <i class="fa-solid fa-star"></i>
                <span>${escapeHtml(restaurant.rating || "4.8")}</span>
              </p>

              <p class="restaurant-desc">
                ${escapeHtml(
                  restaurant.description ||
                    "Fresh food available from this restaurant.",
                )}
              </p>

              <div class="restaurant-offer">
                ${
                  restaurant.delivery_available == 1
                    ? '<i class="fa-solid fa-truck"></i> Delivery available'
                    : '<i class="fa-solid fa-store"></i> Pickup only'
                }
              </div>
            </div>

            <div class="restaurant-action">
              <button type="button" onclick="viewRestaurantMenu(${Number(
                restaurant.id || 0,
              )})">
                View Menu
              </button>
            </div>
          </article>
        `;
      }

      function viewRestaurantMenu(id) {
        if (!id) {
          alert("Restaurant ID not found.");
          return;
        }

        localStorage.setItem("selectedRestaurantId", String(id));

        /*
          Real-world next step:
          Later, this should open the selected restaurant menu page.
          Example:
          window.location.href = `restaurant-menu.html?id=${id}`;
        */

        alert("Next step: show menu for restaurant ID " + id);
      }

      function isRestaurantOpen(restaurant) {
        if (!restaurant.opening_time || !restaurant.closing_time) {
          return true;
        }

        const now = new Date();
        const currentMinutes = now.getHours() * 60 + now.getMinutes();

        const [openHour, openMinute] = String(restaurant.opening_time)
          .split(":")
          .map(Number);

        const [closeHour, closeMinute] = String(restaurant.closing_time)
          .split(":")
          .map(Number);

        if (
          Number.isNaN(openHour) ||
          Number.isNaN(openMinute) ||
          Number.isNaN(closeHour) ||
          Number.isNaN(closeMinute)
        ) {
          return true;
        }

        const openMinutes = openHour * 60 + openMinute;
        const closeMinutes = closeHour * 60 + closeMinute;

        return currentMinutes >= openMinutes && currentMinutes <= closeMinutes;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeAttribute(value) {
        return String(value ?? "")
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'");
      }
    </script>
  </body>
</html>
