<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - FoodExpress</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../assets/images/brand/foodexpress-favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="../assets/images/brand/foodexpress-favicon-64.png"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/shared.css" />

    <style>
      .cart-page {
        max-width: 980px;
        margin: 0 auto;
        padding: 120px 24px 52px;
      }

      .cart-header {
        text-align: center;
        margin-bottom: 36px;
      }

      .cart-header h1 {
        font-size: clamp(2rem, 4vw, 2.8rem);
        color: var(--text-dark);
        margin: 0 0 10px;
        font-weight: 900;
      }

      .cart-header p {
        margin: 0;
        color: var(--text-light);
        font-size: 1.05rem;
      }

      .cart-empty {
        text-align: center;
        padding: 64px 24px;
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 24px;
        color: var(--text-light);
      }

      .cart-empty p {
        font-size: 1.1rem;
        margin-bottom: 22px;
      }

      .cart-empty a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        background: var(--primary);
        color: white;
        border-radius: var(--radius-full);
        text-decoration: none;
        font-weight: 800;
      }

      .cart-items-list {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 22px;
        overflow: hidden;
        margin-bottom: 28px;
      }

      .cart-item {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px;
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
      }

      .cart-item:last-child {
        border-bottom: none;
      }

      .cart-item:hover {
        background: #f9fafb;
      }

      .cart-item-image {
        width: 82px;
        height: 82px;
        background: #f3f4f6;
        border-radius: 16px;
        overflow: hidden;
        flex-shrink: 0;
      }

      .cart-item-image.image-missing::after {
        content: "Food";
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-weight: 800;
      }

      .cart-item-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .cart-item-details {
        flex: 1;
        min-width: 0;
      }

      .cart-item-name {
        font-weight: 800;
        color: var(--text-dark);
        font-size: 1.08rem;
        margin-bottom: 8px;
      }

      .cart-item-price {
        color: var(--primary);
        font-weight: 900;
        font-size: 1.12rem;
        margin-bottom: 6px;
      }

      .cart-item-restaurant {
        color: var(--text-light);
        font-size: 0.95rem;
      }

      .cart-item-quantity {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 130px;
        justify-content: center;
      }

      .qty-btn {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
      }

      .qty-btn:hover {
        background: var(--primary-light);
        color: var(--primary);
      }

      .quantity {
        font-weight: 900;
        min-width: 28px;
        text-align: center;
      }

      .remove-btn {
        background: #fee2e2;
        color: #dc2626;
        border: none;
        padding: 10px 18px;
        border-radius: var(--radius-full);
        cursor: pointer;
        font-weight: 800;
        transition: background 0.2s;
      }

      .remove-btn:hover {
        background: #fecaca;
      }

      .cart-summary {
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 30px;
        margin-bottom: 28px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 16px;
        font-size: 1.05rem;
        color: var(--text-dark);
      }

      .summary-row strong,
      .summary-row .amount {
        font-weight: 800;
      }

      .summary-row.total {
        border-top: 2px solid var(--border);
        padding-top: 18px;
        margin-top: 18px;
        font-size: 1.32rem;
        font-weight: 900;
        color: var(--text-dark);
      }

      .cart-actions {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .btn-continue {
        flex: 1;
        min-height: 56px;
        background: #f3f4f6;
        color: var(--text-dark);
        border: none;
        padding: 14px 20px;
        border-radius: var(--radius-full);
        font-weight: 800;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-continue:hover {
        background: #e5e7eb;
      }

      .btn-checkout {
        flex: 1;
        min-height: 56px;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: var(--radius-full);
        font-weight: 900;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 1rem;
      }

      .btn-checkout:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      .btn-checkout:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      @media (max-width: 720px) {
        .cart-page {
          padding: 104px 16px 40px;
        }

        .cart-item {
          align-items: flex-start;
          flex-wrap: wrap;
        }

        .cart-item-details {
          flex: 1 1 calc(100% - 110px);
        }

        .cart-item-quantity,
        .remove-btn {
          margin-left: 102px;
        }

        .cart-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>

  <body>
    <script>
      if (!localStorage.getItem("isLoggedIn")) {
        alert("Please login first to access your cart");
        window.location.href = "login.html";
      }
    </script>

    <div id="navbarContainer"></div>

    <main class="cart-page">
      <div class="cart-header">
        <h1>Your Cart</h1>
        <p id="cartStatusText">Loading cart items...</p>
      </div>

      <div id="emptyCart" class="cart-empty" style="display: none">
        <p>Your cart is empty. Add a few dishes before checkout.</p>
        <a href="shop.html">Continue Shopping</a>
      </div>

      <div id="cartItemsContainer">
        <div class="cart-items-list" id="cartItemsList"></div>

        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span class="amount">Rs. <span id="subtotal">0.00</span></span>
          </div>

          <div class="summary-row">
            <span>Delivery Fee:</span>
            <span class="amount">Rs. <span id="deliveryFee">0.00</span></span>
          </div>

          <div class="summary-row">
            <span>Tax:</span>
            <span class="amount">Rs. <span id="tax">0.00</span></span>
          </div>

          <div class="summary-row total">
            <span>Total:</span>
            <span>Rs. <span id="total">0.00</span></span>
          </div>
        </div>

        <div class="cart-actions">
          <a href="shop.html" class="btn-continue">← Continue Shopping</a>
          <button class="btn-checkout" id="proceedCheckoutBtn">
            Proceed to Checkout →
          </button>
        </div>
      </div>
    </main>

    <footer class="footer" id="footer"></footer>

    <script src="../js/profile.js?v=profile1"></script>
    <script src="../js/shared.js?v=shared1"></script>
    <script src="../js/modules/cart.js?v=cart1"></script>
    <script src="../js/api/productApi2.js?v=safe1"></script>
    <script src="../js/components/notifications.js?v=backendnotif3"></script>
    <script src="../js/components/navbar.js"></script>
    <script src="../js/cart-page.js?v=rsfix4"></script>
    <script src="../js/components/footer.js"></script>

    <script>
      function initNavbar() {
        if (typeof window.renderNavbar === "function") {
          window.renderNavbar("cart");
        } else {
          setTimeout(initNavbar, 100);
        }
      }

      document.addEventListener("DOMContentLoaded", initNavbar);

      document.addEventListener("DOMContentLoaded", function () {
        if (typeof renderFooter === "function") {
          renderFooter("app");
        }
      });
    </script>
  </body>
</html>
