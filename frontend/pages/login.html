<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodExpress - Login</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="auth-page">
      <section class="auth-wrapper">
        <div class="auth-header">
          <h1 class="auth-title">Welcome <span>Back</span></h1>
          <p class="auth-subtitle">
            Log in to access your account and order delicious food
          </p>
        </div>

        <div class="auth-grid">
          <div class="auth-card">
            <div class="auth-tabs">
              <button class="tab-btn active" data-tab="login" type="button">
                Login
              </button>
              <button class="tab-btn" data-tab="register" type="button">
                Register
              </button>
            </div>

            <div id="loginTab" class="tab-content active">
              <h2>Sign In</h2>
              <form id="loginForm">
                <label>Email Address</label>
                <div class="input-wrap">
                  <input
                    type="email"
                    id="loginEmail"
                    placeholder="john.doe@example.com"
                    required
                  />
                </div>

                <label>Password</label>
                <div class="input-wrap">
                  <input
                    type="password"
                    id="loginPassword"
                    placeholder="Enter your password"
                    required
                  />
                </div>

                <div class="remember-row">
                  <label class="checkbox-label"
                    ><input type="checkbox" /> Remember me</label
                  >
                  <span class="forgot-text">Forgot password?</span>
                </div>

                <button type="submit" class="btn btn-primary full-btn">
                  Sign In →
                </button>
              </form>
            </div>

            <div id="registerTab" class="tab-content">
              <h2>Create Account</h2>
              <form id="registerForm">
                <label>Name</label>
                <input
                  type="text"
                  id="registerName"
                  placeholder="Enter your name"
                  required
                />

                <label>Email</label>
                <input
                  type="email"
                  id="registerEmail"
                  placeholder="Enter your email"
                  required
                />

                <label>Password</label>
                <input
                  type="password"
                  id="registerPassword"
                  placeholder="Enter your password"
                  required
                />

                <label>Phone</label>
                <input
                  type="text"
                  id="registerPhone"
                  maxlength="10"
                  placeholder="0300123456"
                  required
                />

                <label>Address</label>
                <textarea
                  id="registerAddress"
                  placeholder="Enter your address"
                  required
                ></textarea>

                <label>Role</label>
                <select id="registerRole">
                  <option value="customer">Customer</option>
                  <option value="admin">Admin</option>
                </select>

                <button type="submit" class="btn btn-primary full-btn">
                  Register
                </button>
              </form>
            </div>

            <p id="authMessage" class="message"></p>
          </div>

          <div class="auth-image-card">
            <img
              src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1400&auto=format&fit=crop"
              alt="Food plate"
            />
          </div>
        </div>
      </section>
    </main>

    <div id="footer"></div>
    <script type="module" src="../js/pages/login.js"></script>
  </body>
</html>
