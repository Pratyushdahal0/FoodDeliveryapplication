<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodExpress - Menu Management</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/ownerMenu.css" />
  </head>
  <body>
    <!-- NAV -->
    <nav class="navbar" id="navbar">
      <div class="container">
        <div class="navbar-brand">FoodExpress</div>

        <div class="navbar-nav">
          <a href="ownerdashboard.html" class="nav-link">Dashboard</a>
          <a href="ownermanagement.html" class="nav-link">Orders</a>
          <a href="ownerMenu.html" class="nav-link active">Menu</a>
          <a href="ownerearning.html" class="nav-link">Earnings</a>
          <a href="ownerSettings.html" class="nav-link">Settings</a>
        </div>

        <div class="navbar-right">
          <div class="search-box">
            <input type="text" placeholder="Search food..." />
          </div>
          <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <button class="login-btn" type="button" onclick="logout()">
            <i class="fa-regular fa-user"></i>
            Log Out
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main>
      <!-- Header -->
      <div class="header-card">
        <div>
          <h1>Menu <span>Management</span></h1>
          <p>Manage your restaurant menu items</p>
        </div>
        <button class="btn-add" type="button">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add New Item
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-search">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#999"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            id="ownerMenuSearch"
            placeholder="Search menu items..."
          />
        </div>

        <div class="filter-tags">
          <span class="tag active" onclick="filterTag(this, 'All')">All</span>
          <span class="tag" onclick="filterTag(this, 'Nepali')">Nepali</span>
          <span class="tag" onclick="filterTag(this, 'Indian')">Indian</span>
          <span class="tag" onclick="filterTag(this, 'Chinese')">Chinese</span>
          <span class="tag" onclick="filterTag(this, 'Fast Food')"
            >Fast Food</span
          >
          <span class="tag" onclick="filterTag(this, 'Italian')">Italian</span>
          <span class="tag" onclick="filterTag(this, 'Japanese')"
            >Japanese</span
          >
        </div>
      </div>

      <!-- Dynamic Menu Grid -->
      <div class="menu-grid" id="menuGrid"></div>
    </main>

    <!-- MENU MODAL -->
    <div class="menu-modal" id="menuModal">
      <div class="menu-modal-content">
        <div class="menu-modal-header">
          <h2 id="menuModalTitle">Add New Item</h2>
          <button
            type="button"
            class="modal-close-btn"
            id="closeModalBtn"
            aria-label="Close"
          >
            ✕
          </button>
        </div>

        <form id="menuForm">
          <input type="hidden" id="menuItemId" />

          <div class="modal-form-group">
            <label for="menuName">Item Name</label>
            <input
              type="text"
              id="menuName"
              placeholder="Enter item name"
              required
            />
          </div>

          <div class="modal-form-group">
            <label for="menuCategory">Category</label>
            <select id="menuCategory" required>
              <option value="">Select category</option>
              <option value="Nepali">Nepali</option>
              <option value="Indian">Indian</option>
              <option value="Chinese">Chinese</option>
              <option value="Fast Food">Fast Food</option>
              <option value="Italian">Italian</option>
              <option value="Japanese">Japanese</option>
            </select>
          </div>

          <div class="modal-form-group">
            <label for="menuPrice">Price</label>
            <input
              type="number"
              id="menuPrice"
              step="0.01"
              placeholder="Enter price"
              required
            />
          </div>

          <div class="modal-form-group">
            <label for="menuDescription">Description</label>
            <textarea
              id="menuDescription"
              rows="4"
              placeholder="Write a short description"
            ></textarea>
          </div>

          <div class="modal-form-group">
            <label for="menuImage">Image URL</label>
            <input type="text" id="menuImage" placeholder="Paste image URL" />
          </div>

          <div class="modal-form-row">
            <div class="modal-form-group">
              <label for="menuAvailable">Availability</label>
              <select id="menuAvailable">
                <option value="1">Available</option>
                <option value="0">Unavailable</option>
              </select>
            </div>

            <div class="modal-form-group">
              <label for="menuPopular">Popular</label>
              <select id="menuPopular">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" id="cancelModalBtn">
              Cancel
            </button>
            <button type="submit" class="btn-save">Save Item</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Help Button -->
    <button class="help-btn" type="button">?</button>

    <script src="../js/shared.js"></script>
    <script src="../js/ownerMenu.js?v=owner-menu-real-db-1"></script>
  </body>
</html>
