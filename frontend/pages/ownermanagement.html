<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodExpress - Order Management</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/ownerdashboard.css" />
    <link rel="stylesheet" href="../css/odermanagement.css" />
  </head>

  <body>
    <!-- TOP NAV -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">FoodExpress</div>

        <div class="navbar-nav">
          <a href="ownerdashboard.html" class="nav-link">Dashboard</a>
          <a href="ownermanagement.html" class="nav-link active">Orders</a>
          <a href="ownermenu.html" class="nav-link">Menu</a>
          <a href="ownerearning.html" class="nav-link">Earnings</a>
          <a href="ownerSettings.html" class="nav-link">Settings</a>
        </div>

        <div class="navbar-right">
          <div class="search-box">
            <input
              type="text"
              id="orderSearchInput"
              placeholder="Search orders..."
              autocomplete="off"
            />
          </div>

          <button class="login-btn" type="button" onclick="logout()">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- OWNER LAYOUT -->
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-profile">
          <div class="avatar">R</div>
          <div>
            <div class="name">Restaurant Name</div>
            <div class="sub">Owner Dashboard</div>
          </div>
        </div>

        <a href="ownerdashboard.html" class="nav-item">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>

        <a href="ownermanagement.html" class="nav-item active">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          Orders
        </a>

        <a href="ownerMenu.html" class="nav-item">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
          Menu
        </a>

        <a href="ownerearning.html" class="nav-item">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
          Earnings
        </a>

        <a href="ownerSettings.html" class="nav-item">
          <svg
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"
            />
          </svg>
          Settings
        </a>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main">
        <!-- PAGE HEADER -->
        <section class="orders-main-header">
          <div>
            <p class="orders-eyebrow">Restaurant operations</p>
            <h1>Order Management</h1>
            <p>
              Manage incoming orders, kitchen preparation, rider pickup, and
              completed deliveries.
            </p>
          </div>

          <button
            class="orders-refresh-btn"
            type="button"
            onclick="window.location.reload()"
          >
            <i class="fa fa-rotate-right"></i>
            Refresh
          </button>
        </section>

        <!-- STATUS TABS -->
        <section class="tabs owner-order-tabs">
          <button
            class="tab active-pending"
            type="button"
            onclick="switchTab('pending', this)"
          >
            <i class="fa fa-clock"></i>
            <span>Pending (0)</span>
          </button>

          <button
            class="tab"
            type="button"
            onclick="switchTab('accepted', this)"
          >
            <i class="fa fa-utensils"></i>
            <span>In Progress (0)</span>
          </button>

          <button class="tab" type="button" onclick="switchTab('ready', this)">
            <i class="fa fa-box-open"></i>
            <span>Ready for Pickup (0)</span>
          </button>

          <button
            class="tab"
            type="button"
            onclick="switchTab('delivery', this)"
          >
            <i class="fa fa-motorcycle"></i>
            <span>In Delivery (0)</span>
          </button>

          <button
            class="tab"
            type="button"
            onclick="switchTab('delivered', this)"
          >
            <i class="fa fa-circle-check"></i>
            <span>Completed (0)</span>
          </button>

          <button
            class="tab"
            type="button"
            onclick="switchTab('cancelled', this)"
          >
            <i class="fa fa-circle-xmark"></i>
            <span>Cancelled (0)</span>
          </button>
        </section>

        <!-- ORDER SECTIONS -->
        <section class="orders-content-card">
          <div class="order-section active" id="section-pending"></div>
          <div class="order-section" id="section-accepted"></div>
          <div class="order-section" id="section-ready"></div>
          <div class="order-section" id="section-delivery"></div>
          <div class="order-section" id="section-delivered"></div>
          <div class="order-section" id="section-cancelled"></div>
        </section>
      </main>
    </div>

    <script src="../js/shared.js"></script>
    <!-- reward.js should not run on owner management page -->
    <!-- <script src="../js/reward.js"></script> -->
    <script src="../js/ownerOrders.js"></script>

    <script>
      const tabClasses = {
        pending: "active-pending",
        accepted: "active-accepted",
        ready: "active-ready",
        delivery: "active-delivery",
        delivered: "active-delivered",
        cancelled: "active-cancelled",
      };

      function switchTab(type, el) {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.classList.remove(
            "active-pending",
            "active-accepted",
            "active-ready",
            "active-delivery",
            "active-delivered",
            "active-cancelled",
          );
        });

        el.classList.add(tabClasses[type]);

        document.querySelectorAll(".order-section").forEach((section) => {
          section.classList.remove("active");
        });

        const targetSection = document.getElementById("section-" + type);

        if (targetSection) {
          targetSection.classList.add("active");
        }
      }
    </script>
  </body>
</html>
