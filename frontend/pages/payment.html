<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - FoodExpress</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <style>
      .checkout-page {
        max-width: 900px;
        margin: 80px auto 40px;
        padding: 0 20px;
      }

      .checkout-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .checkout-header h1 {
        font-size: 2.5rem;
        color: var(--text-dark);
        margin-bottom: 10px;
      }

      .checkout-container {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 30px;
        margin-bottom: 40px;
      }

      @media (max-width: 768px) {
        .checkout-container {
          grid-template-columns: 1fr;
        }
      }

      .form-section {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 30px;
      }

      .form-section h2 {
        font-size: 1.25rem;
        margin-bottom: 20px;
        color: var(--text-dark);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: var(--text-dark);
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-size: 1rem;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .order-summary {
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        position: sticky;
        top: 90px;
      }

      .order-summary h3 {
        font-size: 1.1rem;
        margin-bottom: 15px;
        color: var(--text-dark);
      }

      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 0.9rem;
      }

      .summary-item.total {
        border-top: 2px solid var(--border);
        padding-top: 10px;
        margin-top: 10px;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text-dark);
      }

      .payment-methods {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      .payment-method {
        display: flex;
        align-items: center;
        padding: 15px;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.2s;
      }

      .payment-method:hover {
        border-color: var(--primary);
        background: #f9fafb;
      }

      .payment-method input[type="radio"] {
        margin-right: 12px;
        cursor: pointer;
        width: 18px;
        height: 18px;
      }

      .payment-method.selected {
        border-color: var(--primary);
        background: rgba(var(--primary-rgb), 0.05);
      }

      .payment-label {
        flex: 1;
        font-weight: 500;
        color: var(--text-dark);
      }

      .place-order-btn {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 16px 20px;
        border-radius: var(--radius-full);
        font-weight: 600;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .place-order-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
      }

      .place-order-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }
    </style>
  </head>
  <body>
    <script>
      const isLoggedIn =
        localStorage.getItem("isLoggedIn") === "true" ||
        localStorage.getItem("isLoggedIn") === "1";

      if (!isLoggedIn) {
        alert("Please login first to proceed with payment");
        window.location.href = "login.html";
      }
    </script>

    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">FoodExpress</div>
        <div class="navbar-nav">
          <a href="dashboard.html" class="nav-link">Home</a>
          <a href="shop.html" class="nav-link">Shop</a>
          <a href="food.html" class="nav-link">Food</a>
          <a href="loggedContact.html" class="nav-link">Contact</a>
        </div>
        <div class="navbar-right">
          <div class="search-box">
            <input type="text" placeholder="Search food..." />
          </div>
          <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
          </div>
          <a
            href="#"
            onclick="
              logout();
              return false;
            "
          >
            <button class="login-btn" type="button">Log out</button>
          </a>
        </div>
      </div>
    </nav>

    <div class="checkout-page">
      <div class="checkout-header">
        <h1>Checkout</h1>
        <p>Complete your order</p>
      </div>

      <div class="checkout-container">
        <div>
          <div class="form-section">
            <h2>Delivery Address</h2>
            <div class="form-group">
              <label for="fullName">Full Name *</label>
              <input
                type="text"
                id="fullName"
                required
                placeholder="Your name"
              />
            </div>
            <div class="form-group">
              <label for="phoneNumber">Phone Number *</label>
              <input
                type="tel"
                id="phoneNumber"
                required
                placeholder="+977 98XXXXXXXX"
              />
            </div>
            <div class="form-group">
              <label for="address">Address *</label>
              <input
                type="text"
                id="address"
                required
                placeholder="Street address"
              />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" required placeholder="City" />
              </div>
              <div class="form-group">
                <label for="postalCode">Postal Code *</label>
                <input
                  type="text"
                  id="postalCode"
                  required
                  placeholder="12345"
                />
              </div>
            </div>
          </div>

          <div class="form-section" style="margin-top: 30px">
            <h2>Payment Method</h2>
            <div class="payment-methods">
              <label class="payment-method selected">
                <input type="radio" name="paymentMethod" value="cash" checked />
                <span class="payment-label">💵 Cash on Delivery</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="paymentMethod" value="card" />
                <span class="payment-label">💳 Credit/Debit Card</span>
              </label>
              <label class="payment-method">
                <input type="radio" name="paymentMethod" value="digital" />
                <span class="payment-label"
                  >📱 Digital Wallet (eSewa, Khalti)</span
                >
              </label>
            </div>

            <div
              id="cardDetails"
              style="
                display: none;
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid var(--border);
              "
            >
              <div class="form-group">
                <label for="cardNumber">Card Number *</label>
                <input
                  type="text"
                  id="cardNumber"
                  placeholder="1234 5678 9012 3456"
                />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="cardExpiry">Expiry Date *</label>
                  <input type="text" id="cardExpiry" placeholder="MM/YY" />
                </div>
                <div class="form-group">
                  <label for="cardCVV">CVV *</label>
                  <input type="text" id="cardCVV" placeholder="123" />
                </div>
              </div>
            </div>
          </div>

          <button
            class="place-order-btn"
            id="placeOrderBtn"
            onclick="placeOrder()"
            style="margin-top: 30px"
            type="button"
          >
            Place Order
          </button>
        </div>

        <div class="order-summary">
          <h3>Order Summary</h3>
          <div class="summary-item">
            <span>Subtotal:</span>
            <span>$<span id="summarySubtotal">0.00</span></span>
          </div>
          <div class="summary-item">
            <span>Delivery Fee:</span>
            <span>$5.00</span>
          </div>
          <div class="summary-item">
            <span>Tax (10%):</span>
            <span>$<span id="summaryTax">0.00</span></span>
          </div>
          <div class="summary-item total">
            <span>Total:</span>
            <span>$<span id="summaryTotal">0.00</span></span>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-grid">
        <div>
          <div class="footer-logo">FoodExpress</div>
          <p class="footer-desc">
            Delivering happiness to your doorstep, one meal at a time.
          </p>
        </div>
      </div>
      <div class="footer-bottom">© 2026 FoodExpress. All rights reserved.</div>
    </footer>

    <script src="../js/api/config.js"></script>
    <script>
      function logout() {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("foodDeliveryCartCount");
        localStorage.removeItem("foodDeliveryCartItems");
        localStorage.removeItem("checkoutItems");
        localStorage.removeItem("checkoutRestaurantId");
        localStorage.removeItem("checkoutRestaurantName");
        localStorage.removeItem("checkoutTotal");
        localStorage.removeItem("checkoutSubtotal");
        localStorage.removeItem("checkoutTax");
        localStorage.removeItem("lastOrder");
        window.location.href = "landingpage.html";
      }

      window.addEventListener("load", function () {
        const subtotal = parseFloat(
          localStorage.getItem("checkoutSubtotal") || "0",
        );
        const tax = parseFloat(localStorage.getItem("checkoutTax") || "0");
        const total = parseFloat(localStorage.getItem("checkoutTotal") || "0");

        document.getElementById("summarySubtotal").textContent =
          subtotal.toFixed(2);
        document.getElementById("summaryTax").textContent = tax.toFixed(2);
        document.getElementById("summaryTotal").textContent = total.toFixed(2);
      });

      document
        .querySelectorAll('input[name="paymentMethod"]')
        .forEach((radio) => {
          radio.addEventListener("change", function () {
            const cardDetails = document.getElementById("cardDetails");
            const paymentMethod = document.querySelector(
              'input[name="paymentMethod"]:checked',
            );

            document
              .querySelectorAll(".payment-method")
              .forEach((m) => m.classList.remove("selected"));

            if (paymentMethod) {
              paymentMethod
                .closest(".payment-method")
                .classList.add("selected");
            }

            if (paymentMethod && paymentMethod.value === "card") {
              cardDetails.style.display = "block";
            } else {
              cardDetails.style.display = "none";
            }
          });
        });

      async function placeOrder() {
        const placeOrderBtn = document.getElementById("placeOrderBtn");

        const fullName = document.getElementById("fullName").value.trim();
        const phoneNumber = document.getElementById("phoneNumber").value.trim();
        const address = document.getElementById("address").value.trim();
        const city = document.getElementById("city").value.trim();
        const postalCode = document.getElementById("postalCode").value.trim();
        const paymentMethodInput = document.querySelector(
          'input[name="paymentMethod"]:checked',
        );

        if (!fullName || !phoneNumber || !address || !city || !postalCode) {
          alert("Please fill in all required fields");
          return;
        }

        if (!paymentMethodInput) {
          alert("Please select a payment method");
          return;
        }

        const paymentMethod = paymentMethodInput.value;

        if (paymentMethod === "card") {
          const cardNumber = document.getElementById("cardNumber").value.trim();
          const cardExpiry = document.getElementById("cardExpiry").value.trim();
          const cardCVV = document.getElementById("cardCVV").value.trim();

          if (!cardNumber || !cardExpiry || !cardCVV) {
            alert("Please fill in all card details");
            return;
          }
        }

        const subtotal = parseFloat(
          localStorage.getItem("checkoutSubtotal") || "0",
        );
        const tax = parseFloat(localStorage.getItem("checkoutTax") || "0");
        const total = parseFloat(localStorage.getItem("checkoutTotal") || "0");
        const cartItems = JSON.parse(
          localStorage.getItem("foodDeliveryCartItems") || "[]",
        );

        if (!Array.isArray(cartItems) || cartItems.length === 0) {
          alert("Your cart is empty!");
          window.location.href = "cart.html";
          return;
        }

        const invalidItem = cartItems.find(
          (item) => !item || !item.id || !item.restaurant_id,
        );

        if (invalidItem) {
          console.error("Invalid cart item:", invalidItem);
          alert(
            "Cart data is invalid. Please remove the items and add them again.",
          );
          return;
        }

        if (!window.API || !window.API.orders) {
          alert("Orders API is not configured correctly.");
          console.error("Missing window.API.orders");
          return;
        }

        const orderData = {
          customer_name: fullName,
          phone_number: phoneNumber,
          address: address,
          city: city,
          postal_code: postalCode,
          payment_method: paymentMethod,
          subtotal: subtotal,
          tax: tax,
          delivery_fee: 5.0,
          total: total,
          items: cartItems,
        };

        try {
          placeOrderBtn.disabled = true;
          placeOrderBtn.textContent = "Placing Order...";

          console.log("Sending order data:", orderData);

          const response = await fetch(`${window.API.orders}?action=create`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(orderData),
          });

          const responseText = await response.text();
          console.log("Raw order response:", responseText);

          let result;
          try {
            result = JSON.parse(responseText);
          } catch (parseError) {
            console.error("JSON parse error:", parseError);
            alert("Server returned invalid response. Check backend.");
            return;
          }

          if (result.success) {
            const firstOrder =
              Array.isArray(result.orders) && result.orders.length
                ? result.orders[0]
                : null;

            const orderDetails = {
              orderId: firstOrder ? firstOrder.order_id : null,
              orderNumber: firstOrder ? firstOrder.order_number : null,
              fullName,
              phoneNumber,
              address,
              city,
              postalCode,
              paymentMethod,
              total,
              items: cartItems,
              timestamp: new Date().toISOString(),
              rawResult: result,
            };

            localStorage.setItem("lastOrder", JSON.stringify(orderDetails));

            localStorage.removeItem("foodDeliveryCartCount");
            localStorage.removeItem("foodDeliveryCartItems");
            localStorage.removeItem("checkoutItems");
            localStorage.removeItem("checkoutRestaurantId");
            localStorage.removeItem("checkoutRestaurantName");
            localStorage.removeItem("checkoutTotal");
            localStorage.removeItem("checkoutSubtotal");
            localStorage.removeItem("checkoutTax");

            const successOrderNumber = firstOrder
              ? firstOrder.order_number
              : "Created";

            alert(
              "✅ Order placed successfully!\n\nOrder Number: " +
                successOrderNumber,
            );
            window.location.href = "dashboard.html";
          } else {
            console.error("Backend order failure:", result);
            alert(
              "Failed to place order: " + (result.message || "Unknown error"),
            );
          }
        } catch (error) {
          console.error("Order request failed:", error);
          alert("Error placing order. Please try again.");
        } finally {
          placeOrderBtn.disabled = false;
          placeOrderBtn.textContent = "Place Order";
        }
      }
    </script>
  </body>
</html>
